<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مركز أجيال لضيافة الأطفال — التقييمات</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Glassmorphism Green/Blue/Yellow Palette */
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-shadow: rgba(0, 0, 0, 0.2);
      
      /* Google Maps Colors */
      --gm-bg: #ffffff;
      --gm-text-main: #202124;
      --gm-text-sec: #70757a;
      --gm-text-body: #3c4043;
      --gm-star: #fbbc04;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      /* المتدرج الزجاجي: أزرق، أخضر، أصفر */
      background: linear-gradient(135deg, #09203f 0%, #114a43 45%, #6b5c15 100%);
      position: relative;
      overflow-x: hidden;
      color: #fff;
    }

    /* Bokeh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 50% at 20% 30%, rgba(34, 193, 195, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 70%, rgba(253, 187, 45, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 30% 30% at 60% 10%, rgba(45, 253, 138, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 18px 60px;
    }

    /* ── Report Button ── */
    .report-btn {
      align-self: flex-start;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 9px 20px;
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      gap: 7px;
      transition: all 0.3s ease;
      margin-bottom: 40px;
    }
    .report-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
      transform: translateY(-1px);
    }
    .report-btn span { font-size: 16px; }

    /* ── Hero Card ── */
    .hero-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 8px 40px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 42px 32px 36px;
      width: 100%;
      max-width: 520px;
      text-align: center;
      animation: floatIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .brand-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 38px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(56, 239, 125, 0.3);
    }

    .brand-name {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .brand-name span { color: #fdfb82; }

    .tagline {
      font-size: 18px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      line-height: 1.6;
      margin: 18px 0 28px;
      font-family: 'Noto Naskh Arabic', serif;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #38ef7d, transparent);
      margin: 0 auto 28px;
    }

    /* ── Review Button ── */
    .review-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 50%, #11998e 100%);
      background-size: 200% auto;
      color: #fff;
      font-family: 'Tajawal', sans-serif;
      font-size: 18px;
      font-weight: 800;
      padding: 16px 44px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 28px rgba(17, 153, 142, 0.45);
      transition: all 0.35s ease;
      letter-spacing: 0.5px;
      animation: pulseGlow 2.5s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 6px 28px rgba(56, 239, 125, 0.3); }
      50%       { box-shadow: 0 6px 40px rgba(56, 239, 125, 0.6), 0 0 0 6px rgba(56, 239, 125, 0.1); }
    }

    .review-btn:hover {
      background-position: right center;
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 12px 36px rgba(17, 153, 142, 0.55);
    }
    
    .review-btn span { font-size: 18px; }

    /* ── Reviews Section ── */
    .reviews-label {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      margin-top: 40px;
      margin-bottom: 20px;
      text-align: center;
    }

    .reviews-grid {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: floatIn 1s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Google Maps Style Review Card ── */
    .gm-review-card {
      background: var(--gm-bg);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      color: var(--gm-text-body);
      text-align: right;
      direction: rtl;
      transition: transform 0.2s ease;
    }
    
    .gm-review-card:hover {
      transform: translateY(-2px);
    }

    .gm-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }

    .gm-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
      margin-left: 14px;
      flex-shrink: 0;
    }

    .gm-user-info {
      flex: 1;
    }

    .gm-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--gm-text-main);
      margin-bottom: 2px;
      font-family: 'Tajawal', sans-serif;
    }

    .gm-meta {
      font-size: 12px;
      color: var(--gm-text-sec);
    }

    .gm-menu {
      color: var(--gm-text-sec);
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      padding: 0 5px;
    }

    .gm-rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .gm-stars {
      color: var(--gm-star);
      font-size: 16px;
      letter-spacing: 2px;
    }

    .gm-time {
      font-size: 12px;
      color: var(--gm-text-sec);
    }

    .gm-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--gm-text-body);
      font-family: 'Noto Naskh Arabic', serif;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 15, 10, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: linear-gradient(145deg, rgba(17,74,67,0.95), rgba(9,32,63,0.98));
      border: 1px solid rgba(56, 239, 125, 0.35);
      border-radius: 24px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      transform: scale(0.92) translateY(20px);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
      text-align: center;
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal-icon {
      width: 60px;
      height: 60px;
      background: rgba(56, 239, 125, 0.15);
      border: 1px solid rgba(56, 239, 125, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      font-size: 26px;
      color: #38ef7d;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .modal-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
    }

    .field-group { margin-bottom: 14px; text-align: right; }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #fdfb82;
      margin-bottom: 7px;
      letter-spacing: 0.5px;
    }

    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 13px 16px;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: border-color 0.25s ease, background 0.25s ease;
      text-align: right;
      direction: rtl;
    }

    .field-input:focus {
      border-color: #38ef7d;
      background: rgba(255,255,255,0.1);
    }

    .field-input::placeholder { color: rgba(255,255,255,0.4); }

    .modal-note {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin: 16px 0 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .modal-note span { color: #fdfb82; font-weight: 600; }

    .modal-actions { display: flex; gap: 10px; }

    .btn-submit {
      flex: 1;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #052015;
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 800;
      padding: 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-cancel {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 14px 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: rgba(255,255,255,0.15); }

    /* Success state */
    .success-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 0;
    }

    .success-msg.show { display: flex; }
    .form-content.hide { display: none; }

    .success-icon { font-size: 48px; color: #38ef7d; }

    .success-text {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    /* Footer */
    .footer {
      margin-top: 40px;
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="page">

  <button class="report-btn" onclick="openModal()">
    <span>⚑</span>
    إبلاغ عن مشكلة
  </button>

  <div class="hero-card">
    <div class="brand-icon">✿</div>
    <div class="brand-name">مركز <span>أجيال</span> للضيافة</div>
    <div class="divider"></div>
    <p class="tagline">بيئة آمنة ومرحة لطفلك، شاركنا رأيك</p>
    <a class="review-btn" href="#" target="_blank" rel="noopener">
      <span>★</span>
      تقييم الآن
    </a>
  </div>

  <p class="reviews-label">ماذا قال أولياء الأمور عنا</p>

  <div class="reviews-grid" id="reviewsContainer">
    </div>

  <div class="footer">© مركز أجيال لضيافة الأطفال — جميع الحقوق محفوظة</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="form-content" id="formContent">
      <div class="modal-icon">⚑</div>
      <div class="modal-title">إبلاغ عن مشكلة</div>
      <div class="modal-sub">يرجى تزويدنا بمعلوماتك للتواصل معك</div>

      <div class="field-group">
        <label class="field-label" for="phoneInput">رقم الجوال</label>
        <input class="field-input" id="phoneInput" type="tel" placeholder="05XXXXXXXX" maxlength="10" />
      </div>

      <div class="field-group">
        <label class="field-label" for="invoiceInput">رقم التسجيل / المشترك</label>
        <input class="field-input" id="invoiceInput" type="text" placeholder="مثال: SUB-00123" />
      </div>

      <div class="modal-note">
        <span>☏</span> سيتم الاتصال بك في أقرب وقت ممكن
      </div>

      <div class="modal-actions">
        <button class="btn-submit" onclick="submitReport()">إرسال البلاغ</button>
        <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
      </div>
    </div>

    <div class="success-msg" id="successMsg">
      <div class="success-icon">✓</div>
      <div class="success-text">تم استلام رسالتك بنجاح</div>
      <p style="font-size:13px;color:rgba(255,255,255,0.6);">ستتواصل الإدارة معك قريباً</p>
      <button class="btn-submit" style="margin-top:8px;max-width:160px;" onclick="closeModal()">حسناً</button>
    </div>
  </div>
</div>

<script>
  // ── Modal Logic ──
  function openModal() {
    document.getElementById('modalOverlay').classList.add('active');
    document.getElementById('formContent').classList.remove('hide');
    document.getElementById('successMsg').classList.remove('show');
    document.getElementById('phoneInput').value = '';
    document.getElementById('invoiceInput').value = '';
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function submitReport() {
    const phone = document.getElementById('phoneInput').value.trim();
    if (!phone) {
      document.getElementById('phoneInput').style.borderColor = '#ff6b6b';
      document.getElementById('phoneInput').focus();
      return;
    }
    document.getElementById('formContent').classList.add('hide');
    document.getElementById('successMsg').classList.add('show');
  }

  document.getElementById('phoneInput').addEventListener('input', function() {
    this.style.borderColor = 'rgba(255,255,255,0.15)';
  });
  
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  // ── 200 Google Maps Reviews Generation Logic ──
  const firstNames = ['سارة', 'أحمد', 'نورة', 'محمد', 'ريم', 'خالد', 'منى', 'عبدالله', 'هند', 'فهد', 'عبير', 'سعد', 'مريم', 'فيصل', 'حصة', 'بدر', 'العنود', 'سلطان'];
  const lastNames = ['العتيبي', 'المطيري', 'الشهري', 'الدوسري', 'القحطاني', 'الشمري', 'الغامدي', 'الزهراني', 'الحربي', 'العنزي', 'السالم', 'اليامي', 'المالكي', 'عسيري'];
  const gmColors = ['#e53935', '#d81b60', '#8e24aa', '#5e35b1', '#3949ab', '#1e88e5', '#039be5', '#00acc1', '#00897b', '#43a047', '#f4511e', '#6d4c41'];
  const reviewsData = [
    "مركز رائع جداً، أطفالي يحبون قضاء الوقت هناك وتطوروا كثيراً.",
    "الاهتمام بالنظافة والأنشطة التعليمية ممتاز. أنصح به بشدة لكل أم عاملة.",
    "المربيات حنونات جداً، أشعر بالاطمئنان وأنا في العمل وترك أطفالي عندهم.",
    "أفضل مركز ضيافة أطفال في المنطقة، برامجهم متنوعة ومفيدة وتنمي مهارات الطفل.",
    "مكان آمن ومجهز بأحدث الألعاب والوسائل التعليمية، ابني لا يريد العودة للمنزل!",
    "شكراً لإدارة المركز والمربيات على جهودهم المبذولة وتفانيهم في العمل.",
    "تجربة ممتازة، ابنتي أصبحت أكثر اجتماعية وتتحدث بطلاقة منذ انضمامها للمركز.",
    "أسعارهم معقولة جداً مقابل العناية الفائقة والاهتمام بالأطفال طوال اليوم.",
    "تطبيقهم للأنشطة الحركية والذهنية رائع ومناسب جداً لأعمار الأطفال المختلفة.",
    "بيئة نظيفة وآمنة، فريق العمل متعاون وودود ويستقبلون الأطفال بابتسامة.",
    "الكاميرات متوفرة وهذا يعطي راحة بال كبيرة للأهل. شكراً لشفافيتكم.",
    "يهتمون بوجبات الأطفال وتكون صحية ومتنوعة، شيء يثلج الصدر.",
    "المكان واسع وشرح، والألعاب نظيفة ويتم تعقيمها باستمرار.",
    "أنشطة الرسم والتلوين حسنت من مهارات طفلي الحركية الدقيقة.",
    "أشكر المعلمة على سعة صدرها وحنانها مع طفلي، مركز يستحق ٥ نجوم."
  ];
  const times = ['منذ أسبوع', 'منذ أسبوعين', 'منذ شهر', 'منذ شهرين', 'منذ ٣ أشهر', 'منذ ٤ أشهر', 'منذ ٥ أشهر', 'منذ ٦ أشهر', 'منذ سنة'];

  // Seeded pseudo-random generator to ensure consistent 200 results
  function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }
  const rand = mulberry32(12345);

  function generateReviews() {
    const container = document.getElementById('reviewsContainer');
    let html = '';

    for (let i = 0; i < 200; i++) {
      const fName = firstNames[Math.floor(rand() * firstNames.length)];
      const lName = lastNames[Math.floor(rand() * lastNames.length)];
      const fullName = `${fName} ${lName}`;
      const firstLetter = fName.charAt(0);
      const color = gmColors[Math.floor(rand() * gmColors.length)];
      const reviewText = reviewsData[Math.floor(rand() * reviewsData.length)];
      const time = times[Math.floor(rand() * times.length)];
      const reviewCount = Math.floor(rand() * 40) + 1;
      const isLocalGuide = rand() > 0.6;
      
      let metaText = `${reviewCount} مراجعة`;
      if (isLocalGuide) metaText = `مرشد محلي · ${metaText}`;

      html += `
        <div class="gm-review-card">
          <div class="gm-header">
            <div class="gm-avatar" style="background-color: ${color}">${firstLetter}</div>
            <div class="gm-user-info">
              <div class="gm-name">${fullName}</div>
              <div class="gm-meta">${metaText}</div>
            </div>
            <div class="gm-menu">⋮</div>
          </div>
          <div class="gm-rating-row">
            <div class="gm-stars">★★★★★</div>
            <div class="gm-time">${time}</div>
          </div>
          <div class="gm-text">${reviewText}</div>
        </div>
      `;
    }
    
    container.innerHTML = html;
  }

  // Generate the 200 reviews on page load
  window.addEventListener('DOMContentLoaded', generateReviews);
</script>

</body>
</html>
